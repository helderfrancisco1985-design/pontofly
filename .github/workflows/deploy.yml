name: Deploy to cPanel via FTP

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # NEXT_PUBLIC_* vars are baked into the client bundle at build time
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SHOPIFY_STORE_DOMAIN: ${{ secrets.NEXT_PUBLIC_SHOPIFY_STORE_DOMAIN }}
          NEXT_PUBLIC_SHOPIFY_STOREFRONT_ACCESS_TOKEN: ${{ secrets.NEXT_PUBLIC_SHOPIFY_STOREFRONT_ACCESS_TOKEN }}

      - name: Assemble deploy folder
        run: |
          mkdir -p deploy
          cp -r .next          deploy/
          cp -r public         deploy/
          cp package.json      deploy/
          cp package-lock.json deploy/
          [ -f next.config.ts ] && cp next.config.ts deploy/
          [ -f next.config.js ] && cp next.config.js deploy/

          # server.js is in .gitignore (not needed for Vercel) — generate for Passenger/cPanel
          cat > deploy/server.js << 'SERVERJS'
          const { createServer } = require("http");
          const { parse } = require("url");
          const next = require("next");

          const port = parseInt(process.env.PORT || "3000", 10);
          const app = next({ dev: false, dir: __dirname });
          const handle = app.getRequestHandler();

          app.prepare().then(() => {
            createServer((req, res) => {
              handle(req, res, parse(req.url, true));
            }).listen(port, () => {
              console.log("> Ready on port " + port);
            });
          });
          SERVERJS

      - name: Deploy via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server:   ${{ secrets.CPANEL_FTP_HOST }}
          username: ${{ secrets.CPANEL_FTP_USER }}
          password: ${{ secrets.CPANEL_FTP_PASSWORD }}
          port: 21
          protocol: ftps        # Explicit FTPS (AUTH TLS) — trocar por "ftp" se o cPanel não suportar TLS
          security: loose       # cPanel pode usar cert que não bate com o hostname; loose evita erro SSL
          local-dir: ./deploy/
          server-dir: /pontofly/ # FTP root = /home/pontofl1/ → /pontofly/ = Application Root
          dangerous-clean-slate: false
