name: Deploy to cPanel

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # NEXT_PUBLIC_* vars are baked into the bundle at build time — must be secrets here
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SHOPIFY_STORE_DOMAIN: ${{ secrets.NEXT_PUBLIC_SHOPIFY_STORE_DOMAIN }}
          NEXT_PUBLIC_SHOPIFY_STOREFRONT_ACCESS_TOKEN: ${{ secrets.NEXT_PUBLIC_SHOPIFY_STOREFRONT_ACCESS_TOKEN }}

      - name: Upload build artifacts to cPanel via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.CPANEL_HOST }}
          username: ${{ secrets.CPANEL_USER }}
          # password auth — swap for key/key_passphrase if using SSH key
          password: ${{ secrets.CPANEL_PASSWORD }}
          port: 22
          source: ".next,public,package.json,package-lock.json,server.js,next.config.ts"
          target: ${{ secrets.CPANEL_TARGET_DIR }}

      - name: Install prod deps, fix permissions, restart app
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.CPANEL_HOST }}
          username: ${{ secrets.CPANEL_USER }}
          password: ${{ secrets.CPANEL_PASSWORD }}
          port: 22
          script: |
            set -e
            cd "${{ secrets.CPANEL_TARGET_DIR }}"

            # Install only production deps (no build, just package extraction)
            npm ci --omit=dev

            # Fix permissions: dirs 755, files 644 — skip node_modules for speed
            find . -not -path './node_modules/*' -type d -exec chmod 755 {} \;
            find . -not -path './node_modules/*' -type f -exec chmod 644 {} \;

            # Tell Passenger to restart on next request
            mkdir -p tmp && touch tmp/restart.txt
