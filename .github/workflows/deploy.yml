name: Deploy to cPanel via FTP

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # NEXT_PUBLIC_* vars are baked into every bundle (client + server) at build time.
      # They must all be present here; they cannot be changed after the build.
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SHOPIFY_STORE_DOMAIN: ${{ secrets.NEXT_PUBLIC_SHOPIFY_STORE_DOMAIN }}
          NEXT_PUBLIC_SHOPIFY_STOREFRONT_ACCESS_TOKEN: ${{ secrets.NEXT_PUBLIC_SHOPIFY_STOREFRONT_ACCESS_TOKEN }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
          NEXT_PUBLIC_GA_MEASUREMENT_ID: ${{ secrets.NEXT_PUBLIC_GA_MEASUREMENT_ID }}

      - name: Assemble deploy folder
        run: |
          mkdir -p deploy
          cp -r .next          deploy/
          cp -r public         deploy/
          cp package.json      deploy/
          cp package-lock.json deploy/
          [ -f next.config.ts ] && cp next.config.ts deploy/
          [ -f next.config.js ] && cp next.config.js deploy/

          # server.js is in .gitignore (not needed for Vercel) — generate for Passenger/cPanel
          cat > deploy/server.js << 'SERVERJS'
const { createServer } = require("http");
const { parse } = require("url");
const next = require("next");

const port = parseInt(process.env.PORT || "3000", 10);
const app = next({ dev: false, dir: __dirname });
const handle = app.getRequestHandler();

app.prepare().then(() => {
  createServer((req, res) => {
    handle(req, res, parse(req.url, true));
  }).listen(port, () => {
    console.log("> Ready on port " + port);
  });
});
SERVERJS

      - name: Deploy via FTP (lftp)
        env:
          FTP_HOST: ${{ secrets.CPANEL_FTP_HOST }}
          FTP_USER: ${{ secrets.CPANEL_FTP_USER }}
          FTP_PASS: ${{ secrets.CPANEL_FTP_PASSWORD }}
        run: |
          sudo apt-get install -y -q lftp
          lftp -u "$FTP_USER","$FTP_PASS" "ftp://$FTP_HOST:21" << 'LFTP'
          set ftp:ssl-force true
          set ftp:ssl-protect-data true
          set ssl:verify-certificate false
          set ftp:passive-mode true
          set net:reconnect-count 5
          set net:reconnect-interval-base 5
          set net:timeout 120
          set ftp:nop-interval 60
          mirror --reverse --verbose --no-perms ./deploy/ /
          bye
          LFTP
