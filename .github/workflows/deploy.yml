name: Deploy to cPanel via FTP

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # NEXT_PUBLIC_* vars are baked into the client bundle at build time
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SHOPIFY_STORE_DOMAIN: ${{ secrets.NEXT_PUBLIC_SHOPIFY_STORE_DOMAIN }}
          NEXT_PUBLIC_SHOPIFY_STOREFRONT_ACCESS_TOKEN: ${{ secrets.NEXT_PUBLIC_SHOPIFY_STOREFRONT_ACCESS_TOKEN }}

      - name: Assemble deploy folder
        run: |
          mkdir -p deploy
          cp -r .next     deploy/
          cp -r public    deploy/
          cp package.json      deploy/
          cp package-lock.json deploy/
          cp server.js         deploy/
          [ -f next.config.ts ] && cp next.config.ts deploy/
          [ -f next.config.js ] && cp next.config.js deploy/

      - name: Deploy via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server:   ${{ secrets.CPANEL_FTP_HOST }}
          username: ${{ secrets.CPANEL_FTP_USER }}
          password: ${{ secrets.CPANEL_FTP_PASSWORD }}
          local-dir:  ./deploy/
          server-dir: /pontofly/
          protocol: ftps        # explicit FTPS (STARTTLS) — muda para "ftp" se o servidor não suportar TLS
          port: 21
          dangerous-clean-slate: false   # nunca apaga ficheiros que não existam localmente (preserva .env, node_modules)
